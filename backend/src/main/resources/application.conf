app {
  storage {
    connection-pool {
      min-connections = 10
      min-connections = ${?MIN_CONNECTIONS}
      max-connections = 20
      max-connections = ${?MAX_CONNECTIONS}
      timeout = 30s
    }

    database {
      host = "localhost"
      port = 5432
      dbname = "happyfarm"
      schema = "happyfarm"
      user = "happy"
      password = "farm"

      host     = ${?PGHOST}
      port     = ${?PGPORT}
      dbname   = ${?PGDATABASE}
      schema   = ${?PGSCHEMA}
      user     = ${?PGUSER}
      password = ${?PGPASSWORD}
    }

    encryption {
      kek-base-64 = "MTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTI="
      kek-base-64 = ${?HAPPY_FARM_KEY_ENCRYPTION_KEY_BASE64}
    }
  }
}